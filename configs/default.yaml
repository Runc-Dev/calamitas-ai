# AFETSONAR default configuration
# Loaded by DefaultConfig.from_yaml("configs/default.yaml")

# ── Dataset ───────────────────────────────────────────────────
num_classes: 6
num_disaster_classes: 5
image_size: 768
pixel_size_m: 0.5

class_weights:
  - 0.05   # background
  - 1.0    # no_damage
  - 8.0    # minor_damage
  - 5.0    # major_damage
  - 7.0    # destroyed
  - 0.5    # unclassified

# ── Training ──────────────────────────────────────────────────
total_epochs: 100
warmup_epochs: 3
lr_peaks:
  - 0.0001
  - 0.0001
  - 0.00007
restart_epochs:
  - 25
  - 50
  - 75
ema_decay: 0.999
kd_temperature: 4.0
batch_size_teacher: 4
batch_size_student: 8

# ── Routing ───────────────────────────────────────────────────
drone_altitude_m: 120.0
lz_min_area_m2: 625.0
lz_min_dim_m: 25.0
vehicle_speed_kmh: 20.0
walking_speed_kmh: 4.0
heli_speed_kmh: 150.0
enkaz_buffer_m: 30.0
max_buildings_per_team: 8
n_teams: 5
population_density: 0.05

# ── Paths ─────────────────────────────────────────────────────
checkpoints_dir: checkpoints
data_dir: data
outputs_dir: outputs
